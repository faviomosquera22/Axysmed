<svg width="760" height="210" viewBox="0 0 760 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vitaAccent" x1="20" y1="40" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0DB88A" />
      <stop offset="1" stop-color="#0A9D7A" />
    </linearGradient>
  </defs>
  
  <!-- Vita Mark -->
  <g transform="translate(0 20) scale(0.45)">
    <!-- Plus sign center -->
    <rect x="60" y="20" width="30" height="140" rx="6" fill="url(#vitaAccent)" stroke="none"/>
    <rect x="10" y="70" width="140" height="30" rx="6" fill="url(#vitaAccent)" stroke="none"/>
    <!-- Corners accent -->
    <circle cx="40" cy="40" r="12" fill="#0DB88A" opacity="0.6"/>
    <circle cx="160" cy="40" r="12" fill="#0DB88A" opacity="0.6"/>
    <circle cx="40" cy="160" r="12" fill="#0DB88A" opacity="0.6"/>
    <circle cx="160" cy="160" r="12" fill="#0DB88A" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="236" y="116" fill="#0A1F3C" font-family="Syne, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="4">VITA</text>
  <text x="238" y="164" fill="#526981" font-family="Figtree, Arial, sans-serif" font-size="34" font-weight="500" letter-spacing="6">GESTIÓN CLÍNICA</text>
</svg>
